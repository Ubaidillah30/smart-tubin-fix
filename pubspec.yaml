name: smart_turbin_app
description: Dashboard monitoring & kontrol Turbin Angin Hybrid (ESP32 + MQTT + Firebase RTDB).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Realtime data & kontrol relay/jadwal -> langsung ke broker MQTT firmware
  mqtt_client: ^10.2.0

  # Histori relay & rekap kecepatan angin 5 menitan
  firebase_core: ^2.27.0
  firebase_database: ^10.4.0

  # Grafik monitoring realtime
  fl_chart: ^0.66.2

  # Format tanggal/jam
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
